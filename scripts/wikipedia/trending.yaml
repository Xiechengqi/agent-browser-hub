site: wikipedia
name: trending
strategy: PUBLIC
browser: false
args:
  limit:
    type: int
    default: 10
    description: Max results
  lang:
    type: string
    default: en
    description: Language code (e.g. en, zh, ja)

pipeline:
  - evaluate: |
      (() => {
        const d = new Date(Date.now() - 86400000);
        const yyyy = d.getUTCFullYear();
        const mm = String(d.getUTCMonth() + 1).padStart(2, '0');
        const dd = String(d.getUTCDate()).padStart(2, '0');
        return `https://${${{ args.lang }}}.wikipedia.org/api/rest_v1/feed/featured/${yyyy}/${mm}/${dd}`;
      })()
    store: url
  - navigate: ${{ store.url }}
  - wait: 1000
  - evaluate: |
      (() => {
        const pre = document.querySelector('pre');
        if (!pre) return [];
        const data = JSON.parse(pre.textContent);
        const articles = data?.mostread?.articles;
        if (!articles || !articles.length) return [];
        const limit = Math.max(1, Math.min(${{ args.limit }}, 50));
        return articles.slice(0, limit).map((a, i) => ({
          rank: i + 1,
          title: a.title || '-',
          description: (a.description || '-').slice(0, 80),
          views: a.views || 0,
        }));
      })()
