site: apple-podcasts
name: search
strategy: PUBLIC
browser: false
args:
  query:
    type: string
    required: true

pipeline:
  - navigate: https://podcasts.apple.com/us/search?term=${{ args.query }}
  - wait: 3000
  - evaluate: |
      (() => {
        const items = [];
        document.querySelectorAll('.we-lockup').forEach(el => {
          const titleEl = el.querySelector('.we-lockup__title');
          const linkEl = el.querySelector('a');
          if (titleEl && linkEl) {
            items.push({
              title: titleEl.textContent.trim(),
              url: linkEl.href
            });
          }
        });
        return items;
      })()
