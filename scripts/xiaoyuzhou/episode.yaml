site: xiaoyuzhou
name: episode
description: View details of a Xiaoyuzhou podcast episode
domain: www.xiaoyuzhoufm.com
strategy: PUBLIC
browser: false

args:
  id:
    type: str
    required: true
    description: Episode ID (eid from podcast-episodes output)

pipeline:
  - evaluate: |
      (async () => {
        const id = '${{ args.id }}';
        const url = `https://www.xiaoyuzhoufm.com/episode/${id}`;
        const resp = await fetch(url, {
          headers: { 'User-Agent': 'Mozilla/5.0 (compatible; agent-browser-hub)' }
        });
        if (!resp.ok) throw new Error(`HTTP ${resp.status} for episode/${id}`);
        const html = await resp.text();
        const match = html.match(/<script id="__NEXT_DATA__"[^>]*>([\s\S]*?)<\/script>/);
        if (!match) throw new Error('Failed to extract __NEXT_DATA__');
        const parsed = JSON.parse(match[1]);
        const ep = parsed.props?.pageProps?.episode;
        if (!ep) throw new Error('Episode not found');
        const formatDuration = (sec) => {
          if (!Number.isFinite(sec) || sec < 0) return '-';
          sec = Math.round(sec);
          const m = Math.floor(sec / 60);
          const s = sec % 60;
          return `${m}:${String(s).padStart(2, '0')}`;
        };
        return [{
          title: ep.title,
          podcast: ep.podcast?.title,
          duration: formatDuration(ep.duration),
          plays: ep.playCount,
          comments: ep.commentCount,
          likes: ep.clapCount,
          date: (ep.pubDate || '').slice(0, 10)
        }];
      })()

columns: [title, podcast, duration, plays, comments, likes, date]
