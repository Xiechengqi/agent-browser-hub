site: xiaoyuzhou
name: podcast
description: View a Xiaoyuzhou podcast profile
domain: www.xiaoyuzhoufm.com
strategy: PUBLIC
browser: false

args:
  id:
    type: str
    required: true
    description: Podcast ID (from xiaoyuzhoufm.com URL)

pipeline:
  - evaluate: |
      (async () => {
        const id = '${{ args.id }}';
        const url = `https://www.xiaoyuzhoufm.com/podcast/${id}`;
        const resp = await fetch(url, {
          headers: { 'User-Agent': 'Mozilla/5.0 (compatible; agent-browser-hub)' }
        });
        if (!resp.ok) throw new Error(`HTTP ${resp.status} for podcast/${id}`);
        const html = await resp.text();
        const match = html.match(/<script id="__NEXT_DATA__"[^>]*>([\s\S]*?)<\/script>/);
        if (!match) throw new Error('Failed to extract __NEXT_DATA__');
        const parsed = JSON.parse(match[1]);
        const p = parsed.props?.pageProps?.podcast;
        if (!p) throw new Error('Podcast not found');
        return [{
          title: p.title,
          author: p.author,
          description: p.brief,
          subscribers: p.subscriptionCount,
          episodes: p.episodeCount,
          updated: (p.latestEpisodePubDate || '').slice(0, 10)
        }];
      })()

columns: [title, author, description, subscribers, episodes, updated]
