meta:
  id: google-search
  name: Google Search
  description: Search Google and extract results
  category: search

config:
  domain: google.com
  strategy: public
  timeout: 30

params:
  - name: keyword
    type: string
    required: true
    positional: true
  - name: limit
    type: integer
    default: 10

steps:
  - action: navigate
    url: "https://www.google.com/search?q={{keyword}}&num={{limit}}"

  - action: wait
    duration: 2

  - action: evaluate
    script: |
      (function() {
        const results = [];
        const links = document.querySelectorAll('#rso a h3');
        links.forEach(h3 => {
          const link = h3.closest('a');
          if (link && link.href) {
            results.push({
              title: h3.textContent,
              url: link.href
            });
          }
        });
        return results;
      })()
    output: result
