site: sinablog
name: search
description: 搜索新浪博客文章（通过新浪搜索）
domain: blog.sina.com.cn
strategy: PUBLIC
browser: false
args:
  keyword:
    type: str
    required: true
    positional: true
    description: 搜索关键词
  limit:
    type: int
    default: 20
    description: 返回的文章数量

pipeline:
  - fetch:
      url: https://search.sina.com.cn/api/search
      params:
        q: ${{ args.keyword }}
        tp: mix
        sort: "0"
        page: "1"
        size: ${{ args.limit }}
        from: search_result
      headers:
        User-Agent: Mozilla/5.0
        Accept: application/json

  - evaluate: |
      (() => {
        const data = ${{ response }};
        const list = Array.isArray(data?.data?.list) ? data.data.list : [];
        const normalize = (value) => typeof value === 'string' ? value.replace(/\s+/g, ' ').trim() : '';
        const stripHtml = (value) => value.replace(/<[^>]+>/g, '');
        return list
          .filter((item) => normalize(item?.url).includes('blog.sina.com.cn/s/blog_'))
          .slice(0, ${{ args.limit }})
          .map((item, index) => ({
            rank: index + 1,
            title: normalize(stripHtml(item?.title || '')),
            author: normalize(item?.media_show || item?.author),
            date: normalize(item?.time || item?.dataTime),
            description: normalize(item?.intro || item?.searchSummary).slice(0, 150),
            url: normalize(item?.url),
          }));
      })()

  - limit: ${{ args.limit }}

columns: [rank, title, author, date, description, url]
