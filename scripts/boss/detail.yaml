site: boss
name: detail
strategy: COOKIE
browser: true
args:
  security-id:
    type: str
    required: true
    description: Security ID from search results

pipeline:
  - navigate: https://www.zhipin.com/web/geek/job
  - wait: 1000
  - evaluate: |
      (() => {
        const securityId = ${{ args.security-id }};
        return new Promise((resolve, reject) => {
          const xhr = new XMLHttpRequest();
          xhr.open('GET', `https://www.zhipin.com/wapi/zpgeek/job/detail.json?securityId=${encodeURIComponent(securityId)}`, true);
          xhr.withCredentials = true;
          xhr.timeout = 15000;
          xhr.setRequestHeader('Accept', 'application/json');
          xhr.onload = () => {
            try {
              const data = JSON.parse(xhr.responseText);
              if (data.code !== 0) reject(new Error(data.message || 'API error'));
              const jobInfo = data.zpData?.jobInfo || {};
              const bossInfo = data.zpData?.bossInfo || {};
              const brandComInfo = data.zpData?.brandComInfo || {};
              if (!jobInfo.jobName) reject(new Error('Job not found'));
              resolve([{
                name: jobInfo.jobName || '',
                salary: jobInfo.salaryDesc || '',
                experience: jobInfo.experienceName || '',
                degree: jobInfo.degreeName || '',
                city: jobInfo.locationName || '',
                district: [jobInfo.areaDistrict, jobInfo.businessDistrict].filter(Boolean).join('·'),
                description: jobInfo.postDescription || '',
                skills: (jobInfo.showSkills || []).join(', '),
                welfare: (brandComInfo.labels || []).join(', '),
                boss_name: bossInfo.name || '',
                boss_title: bossInfo.title || '',
                active_time: bossInfo.activeTimeDesc || '',
                company: brandComInfo.brandName || bossInfo.brandName || '',
                industry: brandComInfo.industryName || '',
                scale: brandComInfo.scaleName || '',
                stage: brandComInfo.stageName || '',
                address: jobInfo.address || '',
                url: jobInfo.encryptId ? 'https://www.zhipin.com/job_detail/' + jobInfo.encryptId + '.html' : ''
              }]);
            } catch(e) { reject(e); }
          };
          xhr.onerror = () => reject(new Error('Network Error'));
          xhr.ontimeout = () => reject(new Error('Timeout'));
          xhr.send(null);
        });
      })()
