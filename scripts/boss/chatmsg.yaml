site: boss
name: chatmsg
strategy: COOKIE
browser: true
args:
  uid:
    type: str
    required: true
    description: Encrypted UID from chatlist
  page:
    type: int
    required: false
    description: Page number (default 1)

pipeline:
  - navigate: https://www.zhipin.com/web/chat/index
  - wait: 2000
  - evaluate: |
      (() => {
        const encryptUid = ${{ args.uid }};
        const page = ${{ args.page }} || 1;
        return new Promise((resolve, reject) => {
          const xhr1 = new XMLHttpRequest();
          xhr1.open('GET', 'https://www.zhipin.com/wapi/zprelation/friend/getBossFriendListV2.json?page=1&status=0&jobId=0', true);
          xhr1.withCredentials = true;
          xhr1.timeout = 15000;
          xhr1.setRequestHeader('Accept', 'application/json');
          xhr1.onload = () => {
            try {
              const data1 = JSON.parse(xhr1.responseText);
              if (data1.code !== 0) reject(new Error(data1.message || 'API error'));
              const friends = data1.zpData?.friendList || [];
              const friend = friends.find(f => f.encryptUid === encryptUid);
              if (!friend) reject(new Error('Candidate not found'));
              const gid = friend.uid;
              const securityId = encodeURIComponent(friend.securityId);
              const xhr2 = new XMLHttpRequest();
              xhr2.open('GET', `https://www.zhipin.com/wapi/zpchat/boss/historyMsg?gid=${gid}&securityId=${securityId}&page=${page}&c=20&src=0`, true);
              xhr2.withCredentials = true;
              xhr2.timeout = 15000;
              xhr2.setRequestHeader('Accept', 'application/json');
              xhr2.onload = () => {
                try {
                  const data2 = JSON.parse(xhr2.responseText);
                  if (data2.code !== 0) reject(new Error(data2.message || 'API error'));
                  const TYPE_MAP = { 1: '文本', 2: '图片', 3: '招呼', 4: '简历', 5: '系统', 6: '名片', 7: '语音', 8: '视频', 9: '表情' };
                  const messages = data2.zpData?.messages || data2.zpData?.historyMsgList || [];
                  resolve(messages.map(m => {
                    const fromObj = m.from || {};
                    const isSelf = typeof fromObj === 'object' ? fromObj.uid !== friend.uid : false;
                    return {
                      from: isSelf ? '我' : (typeof fromObj === 'object' ? fromObj.name : friend.name),
                      type: TYPE_MAP[m.type] || '其他(' + m.type + ')',
                      text: m.text || m.body?.text || '',
                      time: m.time ? new Date(m.time).toLocaleString('zh-CN') : ''
                    };
                  }));
                } catch(e) { reject(e); }
              };
              xhr2.onerror = () => reject(new Error('Network Error'));
              xhr2.ontimeout = () => reject(new Error('Timeout'));
              xhr2.send(null);
            } catch(e) { reject(e); }
          };
          xhr1.onerror = () => reject(new Error('Network Error'));
          xhr1.ontimeout = () => reject(new Error('Timeout'));
          xhr1.send(null);
        });
      })()
