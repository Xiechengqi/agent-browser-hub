site: boss
name: mark
strategy: COOKIE
browser: true
args:
  uid:
    type: str
    required: true
    description: Encrypted UID of candidate
  label:
    type: str
    required: true
    description: Label name or ID
  remove:
    type: bool
    required: false
    description: Remove label instead of adding

pipeline:
  - navigate: https://www.zhipin.com/web/chat/index
  - wait: 2000
  - evaluate: |
      (() => {
        const encryptUid = ${{ args.uid }};
        const labelInput = ${{ args.label }};
        const remove = ${{ args.remove }} || false;
        const LABEL_MAP = { '新招呼': 1, '沟通中': 2, '已约面': 3, '已获取简历': 4, '已交换电话': 5, '已交换微信': 6, '不合适': 7, '牛人发起': 8, '收藏': 11 };
        let labelId = LABEL_MAP[labelInput] || parseInt(labelInput);
        if (!labelId) throw new Error('Unknown label: ' + labelInput);
        return new Promise((resolve, reject) => {
          const xhr1 = new XMLHttpRequest();
          xhr1.open('GET', 'https://www.zhipin.com/wapi/zprelation/friend/getBossFriendListV2.json?page=1&status=0&jobId=0', true);
          xhr1.withCredentials = true;
          xhr1.timeout = 15000;
          xhr1.setRequestHeader('Accept', 'application/json');
          xhr1.onload = () => {
            try {
              const data1 = JSON.parse(xhr1.responseText);
              if (data1.code !== 0) reject(new Error(data1.message || 'API error'));
              const friends = data1.zpData?.friendList || [];
              const friend = friends.find(f => f.encryptUid === encryptUid);
              if (!friend) reject(new Error('Candidate not found'));
              const action = remove ? 'deleteMark' : 'addMark';
              const url = `https://www.zhipin.com/wapi/zprelation/friend/label/${action}?friendId=${friend.uid}&friendSource=${friend.friendSource || 0}&labelId=${labelId}`;
              const xhr2 = new XMLHttpRequest();
              xhr2.open('GET', url, true);
              xhr2.withCredentials = true;
              xhr2.timeout = 15000;
              xhr2.setRequestHeader('Accept', 'application/json');
              xhr2.onload = () => {
                try {
                  const data2 = JSON.parse(xhr2.responseText);
                  if (data2.code !== 0) reject(new Error(data2.message || 'API error'));
                  const labelName = Object.entries(LABEL_MAP).find(([, v]) => v === labelId)?.[0] || String(labelId);
                  resolve([{ status: remove ? '✅ 标签已移除' : '✅ 标签已添加', detail: `${friend.name}: ${remove ? '移除' : '添加'}标签「${labelName}」` }]);
                } catch(e) { reject(e); }
              };
              xhr2.onerror = () => reject(new Error('Network Error'));
              xhr2.ontimeout = () => reject(new Error('Timeout'));
              xhr2.send(null);
            } catch(e) { reject(e); }
          };
          xhr1.onerror = () => reject(new Error('Network Error'));
          xhr1.ontimeout = () => reject(new Error('Timeout'));
          xhr1.send(null);
        });
      })()
