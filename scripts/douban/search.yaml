site: douban
name: search
strategy: COOKIE
browser: true
args:
  query:
    type: string
    required: true

pipeline:
  - navigate: https://www.douban.com/search?q=${{ args.query }}
  - wait: 2000
  - evaluate: |
      (() => {
        const items = [];
        document.querySelectorAll('.result').forEach(result => {
          const titleEl = result.querySelector('.title a');
          if (titleEl) {
            items.push({
              title: titleEl.textContent.trim(),
              url: titleEl.href
            });
          }
        });
        return items;
      })()
