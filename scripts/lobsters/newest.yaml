site: lobsters
name: newest
strategy: PUBLIC
browser: false

pipeline:
  - navigate: https://lobste.rs/newest
  - wait: 2000
  - evaluate: |
      (() => {
        const items = [];
        document.querySelectorAll('.story').forEach(story => {
          const titleEl = story.querySelector('.u-url');
          if (titleEl) {
            items.push({
              title: titleEl.textContent.trim(),
              url: titleEl.href
            });
          }
        });
        return items;
      })()
