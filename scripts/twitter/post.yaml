site: twitter
name: post
description: Post a new tweet
domain: x.com
strategy: COOKIE
browser: true

args:
  text:
    type: str
    required: true
    positional: true
    description: The text content of the tweet

pipeline:
  - navigate:
      url: https://x.com/compose/tweet
      settleMs: 3000

  - evaluate: |
      (async () => {
        const box = document.querySelector('[data-testid="tweetTextarea_0"]');
        if (box) {
          box.focus();
          const textToInsert = ${{ args.text | json }};
          const dataTransfer = new DataTransfer();
          dataTransfer.setData('text/plain', textToInsert);
          box.dispatchEvent(new ClipboardEvent('paste', {
            clipboardData: dataTransfer,
            bubbles: true,
            cancelable: true
          }));
        } else {
          return [{ status: 'failed', message: 'Could not find tweet composer' }];
        }

        await new Promise(r => setTimeout(r, 1000));

        const btn = document.querySelector('[data-testid="tweetButton"]') || document.querySelector('[data-testid="tweetButtonInline"]');
        if (btn && !btn.disabled) {
          btn.click();
          await new Promise(r => setTimeout(r, 3000));
          return [{ status: 'success', message: 'Tweet posted successfully' }];
        } else {
          return [{ status: 'failed', message: 'Tweet button disabled or not found' }];
        }
      })()

columns: [status, message]
