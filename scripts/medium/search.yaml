site: medium
name: search
strategy: PUBLIC
browser: false
args:
  query:
    type: string
    required: true

pipeline:
  - navigate: https://medium.com/search?q=${{ args.query }}
  - wait: 3000
  - evaluate: |
      (() => {
        const items = [];
        document.querySelectorAll('article').forEach(article => {
          const titleEl = article.querySelector('h2');
          const linkEl = article.querySelector('a[data-action="open-post"]');
          if (titleEl && linkEl) {
            items.push({
              title: titleEl.textContent.trim(),
              url: linkEl.href
            });
          }
        });
        return items;
      })()
