site: discord-app
name: status
description: Check active CDP connection to Discord Desktop
domain: localhost
strategy: COOKIE
browser: true

args: {}

pipeline:
  - evaluate: |
      (() => {
        const url = window.location.href;
        const title = document.title;
        return [{ Status: 'Connected', Url: url, Title: title }];
      })()

columns: [Status, Url, Title]
