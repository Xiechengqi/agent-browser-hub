site: substack
name: feed
strategy: PUBLIC
browser: false

pipeline:
  - navigate: https://substack.com/
  - wait: 2000
  - evaluate: |
      (() => {
        const items = [];
        document.querySelectorAll('article').forEach(article => {
          const titleEl = article.querySelector('h3, h2');
          const linkEl = article.querySelector('a');
          if (titleEl && linkEl) {
            items.push({
              title: titleEl.textContent.trim(),
              url: linkEl.href
            });
          }
        });
        return items;
      })()
