site: weibo
name: hot
strategy: COOKIE
browser: true

pipeline:
  - navigate: https://weibo.com/
  - wait: 2000
  - evaluate: |
      (() => {
        const items = [];
        document.querySelectorAll('.card-wrap').forEach(card => {
          const titleEl = card.querySelector('.txt');
          if (titleEl) {
            items.push({
              title: titleEl.textContent.trim()
            });
          }
        });
        return items;
      })()
