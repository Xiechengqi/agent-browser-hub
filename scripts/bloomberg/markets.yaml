site: bloomberg
name: markets
strategy: PUBLIC
browser: false

pipeline:
  - navigate: https://www.bloomberg.com/markets
  - wait: 3000
  - evaluate: |
      (() => {
        const items = [];
        document.querySelectorAll('article').forEach(article => {
          const titleEl = article.querySelector('a[data-component="headline-link"]');
          if (titleEl) {
            items.push({
              title: titleEl.textContent.trim(),
              url: titleEl.href
            });
          }
        });
        return items;
      })()
