name = "search"
description = "Search YouTube videos"
strategy = "COOKIE"

[[params]]
name = "query"
type = "string"
required = true
positional = false
description = "Search query"

[[params]]
name = "limit"
type = "int"
required = false
positional = false
description = "Max results (max 50)"
default = 20

[execution]
entry = "script"
script = "scripts/search.json"

[output]
columns = ["rank", "title", "channel", "views", "duration", "url"]
