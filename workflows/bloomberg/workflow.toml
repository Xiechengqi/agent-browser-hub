schema_version = 1
site = "bloomberg"
display_name = "Bloomberg"
version = "0.1.0"

[runtime]
workflow_api = "1"
min_hub_version = "0.1.0"
min_agent_browser_version = "0.1.0"

[package]
kind = "standard"
default_enabled = true

[auth]
strategy = "COOKIE"
login_required = true
domains = ["bloomberg"]

[ui]
tags = ["bloomberg"]

[commands]
include = ["businessweek", "economics", "feeds", "industries", "main", "markets", "news", "opinions", "politics", "tech"]
