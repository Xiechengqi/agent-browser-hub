schema_version = 1
site = "reuters"
display_name = "Reuters"
version = "0.1.0"

[runtime]
workflow_api = "1"
min_hub_version = "0.1.0"
min_agent_browser_version = "0.1.0"

[package]
kind = "standard"
default_enabled = true

[auth]
strategy = "PUBLIC"
login_required = false
domains = ["reuters", "www.reuters.com"]

[ui]
tags = ["reuters"]

[commands]
include = ["news", "search"]
