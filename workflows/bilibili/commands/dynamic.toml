name = "dynamic"
description = "Get Bilibili user dynamic feed"
strategy = "COOKIE"

[[params]]
name = "limit"
type = "int"
required = false
positional = false
description = "Number of results"
default = 15

[execution]
entry = "script"
script = "scripts/dynamic.json"

[output]
columns = ["id", "author", "text", "likes", "url"]
