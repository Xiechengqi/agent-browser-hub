name = "thread"
description = "Get a tweet thread (original + all replies)"
strategy = "COOKIE"

[[params]]
name = "tweet_id"
type = "string"
required = true
positional = true
description = "Tweet ID or URL"

[[params]]
name = "limit"
type = "int"
required = false
positional = false
description = "Number of tweets"
default = 50

[execution]
entry = "script"
script = "scripts/thread.json"

[output]
columns = ["id", "author", "text", "likes", "url"]
