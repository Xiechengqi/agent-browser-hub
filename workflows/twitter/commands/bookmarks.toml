name = "bookmarks"
description = "Fetch Twitter/X bookmarks"
strategy = "COOKIE"

[[params]]
name = "limit"
type = "int"
required = false
positional = false
description = "Number of bookmarks"
default = 20

[execution]
entry = "script"
script = "scripts/bookmarks.json"

[output]
columns = ["author", "text", "likes", "url"]
