name = "followers"
description = "Get accounts following a Twitter/X user"
strategy = "COOKIE"

[[params]]
name = "user"
type = "string"
required = false
positional = true
description = "Twitter username (leave empty for logged-in user)"

[[params]]
name = "limit"
type = "int"
required = false
positional = false
description = "Number of followers"
default = 50

[execution]
entry = "script"
script = "scripts/followers.json"

[output]
columns = ["screen_name", "name", "bio", "followers"]
