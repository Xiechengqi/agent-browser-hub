schema_version = 1
site = "steam"
display_name = "Steam"
version = "0.1.0"

[runtime]
workflow_api = "1"
min_hub_version = "0.1.0"
min_agent_browser_version = "0.1.0"

[package]
kind = "standard"
default_enabled = true

[auth]
strategy = "PUBLIC"
login_required = false
domains = ["store.steampowered.com"]

[ui]
tags = ["steam"]

[commands]
include = ["top-sellers"]
