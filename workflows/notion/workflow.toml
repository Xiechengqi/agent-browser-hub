schema_version = 1
site = "notion"
display_name = "Notion"
version = "0.1.0"

[runtime]
workflow_api = "1"
min_hub_version = "0.1.0"
min_agent_browser_version = "0.1.0"

[package]
kind = "standard"
default_enabled = true

[auth]
strategy = "UI"
login_required = true
domains = ["notion"]

[ui]
tags = ["notion"]

[commands]
include = ["favorites", "new", "read", "search", "sidebar", "status", "write"]
