schema_version = 1
site = "lobsters"
display_name = "Lobsters"
version = "0.1.0"

[runtime]
workflow_api = "1"
min_hub_version = "0.1.0"
min_agent_browser_version = "0.1.0"

[package]
kind = "standard"
default_enabled = true

[auth]
strategy = "PUBLIC"
login_required = false
domains = ["lobste.rs", "lobsters"]

[ui]
tags = ["lobsters"]

[commands]
include = ["active", "hot", "newest", "search", "tag"]
