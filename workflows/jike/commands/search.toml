name = "search"
description = "搜索即刻帖子"
strategy = "COOKIE"

[[params]]
name = "query"
type = "string"
required = true
positional = true
description = "Search query"

[[params]]
name = "limit"
type = "int"
required = false
positional = false
description = "Number of results"
default = 20

[execution]
entry = "script"
script = "scripts/search.json"

[output]
columns = ["author", "content", "likes", "comments", "time", "url"]
