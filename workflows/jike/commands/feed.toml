name = "feed"
description = "即刻首页动态流"
strategy = "COOKIE"

[[params]]
name = "limit"
type = "int"
required = false
positional = false
description = "Number of posts to fetch"
default = 20

[execution]
entry = "script"
script = "scripts/feed.json"

[output]
columns = ["author", "content", "likes", "comments", "time", "url"]
