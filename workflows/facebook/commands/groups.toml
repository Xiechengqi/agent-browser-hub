name = "groups"
description = "List your Facebook groups"
strategy = "PUBLIC"

[[params]]
name = "limit"
type = "int"
required = false
positional = false
description = "Number of groups"
default = 20

[execution]
entry = "script"
script = "scripts/groups.json"

[output]
columns = ["index", "name", "last_post", "url"]
