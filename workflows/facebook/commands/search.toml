name = "search"
description = "Search Facebook for people, pages, or posts"
strategy = "PUBLIC"

[[params]]
name = "query"
type = "string"
required = true
positional = true
description = "Search query"

[[params]]
name = "limit"
type = "int"
required = false
positional = false
description = "Number of results"
default = 10

[execution]
entry = "script"
script = "scripts/search.json"

[output]
columns = ["index", "title", "text", "url"]
