schema_version = 1
site = "facebook"
display_name = "Facebook"
version = "0.1.0"

[runtime]
workflow_api = "1"
min_hub_version = "0.1.0"
min_agent_browser_version = "0.1.0"

[package]
kind = "standard"
default_enabled = true

[auth]
strategy = "PUBLIC"
login_required = false
domains = ["www.facebook.com"]

[ui]
tags = ["facebook"]

[commands]
include = ["add-friend", "events", "feed", "friends", "groups", "join-group", "memories", "notifications", "profile", "search"]
