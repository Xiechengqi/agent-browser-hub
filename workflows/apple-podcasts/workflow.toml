schema_version = 1
site = "apple-podcasts"
display_name = "Apple Podcasts"
version = "0.1.0"

[runtime]
workflow_api = "1"
min_hub_version = "0.1.0"
min_agent_browser_version = "0.1.0"

[package]
kind = "standard"
default_enabled = true

[auth]
strategy = "PUBLIC"
login_required = false
domains = ["apple-podcasts"]

[ui]
tags = ["apple-podcasts"]

[commands]
include = ["episodes", "search", "top"]
