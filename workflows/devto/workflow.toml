schema_version = 1
site = "devto"
display_name = "Devto"
version = "0.1.0"

[runtime]
workflow_api = "1"
min_hub_version = "0.1.0"
min_agent_browser_version = "0.1.0"

[package]
kind = "standard"
default_enabled = true

[auth]
strategy = "PUBLIC"
login_required = false
domains = ["devto", "dev.to"]

[ui]
tags = ["devto"]

[commands]
include = ["feed", "search", "tag", "top", "user"]
