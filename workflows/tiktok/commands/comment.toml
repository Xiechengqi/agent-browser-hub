name = "comment"
description = "Comment on a TikTok video"
strategy = "PUBLIC"

[[params]]
name = "url"
type = "string"
required = true
positional = true
description = "TikTok video URL"

[[params]]
name = "text"
type = "string"
required = true
positional = true
description = "Comment text"

[execution]
entry = "script"
script = "scripts/comment.json"

[output]
columns = ["status", "url", "text"]
