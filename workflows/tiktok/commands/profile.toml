name = "profile"
description = "Get TikTok user profile info"
strategy = "PUBLIC"

[[params]]
name = "username"
type = "string"
required = true
positional = true
description = "TikTok username (without @)"

[execution]
entry = "script"
script = "scripts/profile.json"

[output]
columns = ["username", "name", "followers", "following", "likes", "videos", "verified", "bio"]
