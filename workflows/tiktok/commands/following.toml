name = "following"
description = "List accounts you follow on TikTok"
strategy = "PUBLIC"

[[params]]
name = "limit"
type = "int"
required = false
positional = false
description = "Number of accounts"
default = 20

[execution]
entry = "script"
script = "scripts/following.json"

[output]
columns = ["index", "username", "name"]
