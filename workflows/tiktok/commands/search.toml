name = "search"
description = "Search TikTok videos"
strategy = "PUBLIC"

[[params]]
name = "query"
type = "string"
required = true
positional = true
description = "Search query"

[[params]]
name = "limit"
type = "int"
required = false
positional = false
description = "Number of results"
default = 10

[execution]
entry = "script"
script = "scripts/search.json"

[output]
columns = ["rank", "desc", "author", "plays", "likes", "comments", "shares"]
