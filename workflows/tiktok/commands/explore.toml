name = "explore"
description = "Get trending TikTok videos from explore page"
strategy = "PUBLIC"

[[params]]
name = "limit"
type = "int"
required = false
positional = false
description = "Number of videos"
default = 20

[execution]
entry = "script"
script = "scripts/explore.json"

[output]
columns = ["rank", "author", "views", "url"]
