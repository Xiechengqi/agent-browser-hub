schema_version = 1
site = "tiktok"
display_name = "Tiktok"
version = "0.1.0"

[runtime]
workflow_api = "1"
min_hub_version = "0.1.0"
min_agent_browser_version = "0.1.0"

[package]
kind = "standard"
default_enabled = true

[auth]
strategy = "PUBLIC"
login_required = false
domains = ["www.tiktok.com"]

[ui]
tags = ["tiktok"]

[commands]
include = ["comment", "explore", "follow", "following", "friends", "like", "live", "notifications", "profile", "save", "search", "unfollow", "unlike", "unsave", "user"]
