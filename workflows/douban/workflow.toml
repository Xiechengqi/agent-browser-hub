schema_version = 1
site = "douban"
display_name = "Douban"
version = "0.1.0"

[runtime]
workflow_api = "1"
min_hub_version = "0.1.0"
min_agent_browser_version = "0.1.0"

[package]
kind = "standard"
default_enabled = true

[auth]
strategy = "COOKIE"
login_required = true
domains = ["douban", "movie.douban.com"]

[ui]
tags = ["douban"]

[commands]
include = ["book-hot", "marks", "movie-hot", "reviews", "search", "subject", "top250"]
