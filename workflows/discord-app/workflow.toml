schema_version = 1
site = "discord-app"
display_name = "Discord App"
version = "0.1.0"

[runtime]
workflow_api = "1"
min_hub_version = "0.1.0"
min_agent_browser_version = "0.1.0"

[package]
kind = "standard"
default_enabled = true

[auth]
strategy = "COOKIE"
login_required = true
domains = ["localhost"]

[ui]
tags = ["discord-app"]

[commands]
include = ["channels", "members", "read", "search", "send", "servers", "status"]
