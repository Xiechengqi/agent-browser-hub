name = "read"
description = "Read recent messages from the active Discord channel"
strategy = "COOKIE"

[[params]]
name = "count"
type = "int"
required = false
positional = false
description = "Number of messages to read"
default = 20

[execution]
entry = "script"
script = "scripts/read.json"

[output]
columns = ["Author", "Time", "Message"]
