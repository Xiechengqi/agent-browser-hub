schema_version = 1
site = "linux-do"
display_name = "Linux Do"
version = "0.1.0"

[runtime]
workflow_api = "1"
min_hub_version = "0.1.0"
min_agent_browser_version = "0.1.0"

[package]
kind = "standard"
default_enabled = true

[auth]
strategy = "PUBLIC"
login_required = false
domains = ["linux.do"]

[ui]
tags = ["linux-do"]

[commands]
include = ["categories", "category", "hot", "latest", "search", "topic"]
