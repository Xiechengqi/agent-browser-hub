name = "categories"
description = "linux.do 分类列表"
strategy = "PUBLIC"

[[params]]
name = "limit"
type = "int"
required = false
positional = false
description = "Number of categories"
default = 20

[execution]
entry = "script"
script = "scripts/categories.json"

[output]
columns = ["name", "slug", "id", "topics", "description"]
