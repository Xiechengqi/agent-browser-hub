name = "category"
description = "linux.do 分类内话题"
strategy = "PUBLIC"

[[params]]
name = "slug"
type = "string"
required = true
positional = true
description = "Category slug (use 'categories' command to find)"

[[params]]
name = "id"
type = "int"
required = true
positional = true
description = "Category ID (use 'categories' command to find)"

[[params]]
name = "limit"
type = "int"
required = false
positional = false
description = "Number of topics"
default = 20

[execution]
entry = "script"
script = "scripts/category.json"

[output]
columns = ["rank", "title", "replies", "views", "likes"]
