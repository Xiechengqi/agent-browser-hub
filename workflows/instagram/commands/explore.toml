name = "explore"
description = "Instagram explore/discover trending posts"
strategy = "PUBLIC"

[[params]]
name = "limit"
type = "int"
required = false
positional = false
description = "Number of posts"
default = 20

[execution]
entry = "script"
script = "scripts/explore.json"

[output]
columns = ["rank", "user", "caption", "likes", "comments", "type"]
