name = "saved"
description = "Get your saved Instagram posts"
strategy = "PUBLIC"

[[params]]
name = "limit"
type = "int"
required = false
positional = false
description = "Number of saved posts"
default = 20

[execution]
entry = "script"
script = "scripts/saved.json"

[output]
columns = ["index", "user", "caption", "likes", "comments", "type"]
