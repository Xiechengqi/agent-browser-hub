schema_version = 1
site = "instagram"
display_name = "Instagram"
version = "0.1.0"

[runtime]
workflow_api = "1"
min_hub_version = "0.1.0"
min_agent_browser_version = "0.1.0"

[package]
kind = "standard"
default_enabled = true

[auth]
strategy = "PUBLIC"
login_required = false
domains = ["www.instagram.com"]

[ui]
tags = ["instagram"]

[commands]
include = ["comment", "explore", "follow", "followers", "following", "like", "profile", "save", "saved", "search", "unfollow", "unlike", "unsave", "user"]
