name = "search"
description = "搜索小红书笔记"
strategy = "COOKIE"

[[params]]
name = "query"
type = "string"
required = true
positional = false
description = "Search keyword"

[[params]]
name = "limit"
type = "int"
required = false
positional = false
description = "Number of results"
default = 20

[execution]
entry = "script"
script = "scripts/search.json"

[output]
columns = ["rank", "title", "author", "likes", "url"]
