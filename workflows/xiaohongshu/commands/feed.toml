name = "feed"
description = "小红书首页推荐 Feed (via Pinia Store Action)"
strategy = "INTERCEPT"

[[params]]
name = "limit"
type = "int"
required = false
positional = false
description = "Number of items to return"
default = 20

[execution]
entry = "script"
script = "scripts/feed.json"

[output]
columns = ["title", "author", "likes", "type", "url"]
