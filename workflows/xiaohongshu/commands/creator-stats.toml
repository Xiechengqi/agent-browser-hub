name = "creator-stats"
description = "小红书创作者数据总览 (观看/点赞/收藏/评论/分享/涨粉，含每日趋势)"
strategy = "COOKIE"

[[params]]
name = "period"
type = "string"
required = false
positional = false
description = "Stats period: seven or thirty"
default = "seven"

[execution]
entry = "script"
script = "scripts/creator-stats.json"

[output]
columns = ["metric", "total", "trend"]
