schema_version = 1
site = "xiaohongshu"
display_name = "Xiaohongshu"
version = "0.1.0"

[runtime]
workflow_api = "1"
min_hub_version = "0.1.0"
min_agent_browser_version = "0.1.0"

[package]
kind = "standard"
default_enabled = true

[auth]
strategy = "COOKIE"
login_required = true
domains = ["creator.xiaohongshu.com", "www.xiaohongshu.com"]

[ui]
tags = ["xiaohongshu"]

[commands]
include = ["creator-note-detail", "creator-notes", "creator-notes-summary", "creator-profile", "creator-stats", "feed", "notifications", "publish", "search", "user"]
