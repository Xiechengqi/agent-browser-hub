schema_version = 1
site = "xiaoyuzhou"
display_name = "Xiaoyuzhou"
version = "0.1.0"

[runtime]
workflow_api = "1"
min_hub_version = "0.1.0"
min_agent_browser_version = "0.1.0"

[package]
kind = "standard"
default_enabled = true

[auth]
strategy = "PUBLIC"
login_required = false
domains = ["www.xiaoyuzhoufm.com"]

[ui]
tags = ["xiaoyuzhou"]

[commands]
include = ["episode", "podcast", "podcast-episodes"]
