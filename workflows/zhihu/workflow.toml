schema_version = 1
site = "zhihu"
display_name = "Zhihu"
version = "0.1.0"

[runtime]
workflow_api = "1"
min_hub_version = "0.1.0"
min_agent_browser_version = "0.1.0"

[package]
kind = "standard"
default_enabled = true

[auth]
strategy = "COOKIE"
login_required = true
domains = ["www.zhihu.com"]

[ui]
tags = ["zhihu"]

[commands]
include = ["hot", "question", "search"]
